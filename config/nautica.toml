[nautica]
debug = true # Enables tools and endpoints useful of debugging
systemd = false # Disables the shell service in order to work as a systemd service (Remote Access may be needed)

[services]
http = true # Enables the HTTP Server service, more configuration available in

[http]
host = "127.0.0.1" # Use 0.0.0.0 to expose your app, 127.0.0.1 to keep local
port = 8100 # Port to host the app on, by default is set to 8100
realIPHeader = "" # Name of the header which has the real ip, e.g. X-Real-IP, CF-Connecting-IP (if behind proxy), set to empty to use requesting machine's IP instead
