[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nautica"
version = "3.0.0"
description = "The Everything-you-need API Framework built on top of Starlette"
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "starlette",
    "uvicorn",
    "python-multipart",
    "colorama",
    "tomlkit",
    "click",
    "psutil",
    "textual"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["nautica*", "napi*"]

[project.scripts]
nautica = "nautica.__main__:cli"